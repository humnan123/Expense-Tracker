<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; }
    .navbar { background: #4f46e5; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    .navbar h1 { font-size: 18px; }
    .navbar button { background: transparent; border: 1px solid white; color: white; padding: 6px 14px; border-radius: 6px; cursor: pointer; }
    .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .stat { background: white; padding: 1.25rem; border-radius: 12px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .stat p { font-size: 13px; color: #666; margin-bottom: 4px; }
    .stat h2 { font-size: 22px; font-weight: 600; }
    .income { color: #16a34a; }
    .expense { color: #dc2626; }
    .balance { color: #4f46e5; }
    .section { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .section h3 { margin-bottom: 1rem; font-size: 16px; }
    .form-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
    .form-row input, .form-row select { padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; flex: 1; min-width: 120px; }
    .form-row button { padding: 8px 16px; background: #4f46e5; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px; border-bottom: 2px solid #eee; color: #888; font-weight: 500; }
    td { padding: 10px 8px; border-bottom: 1px solid #f0f0f0; }
    .badge { padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
    .badge-income { background: #dcfce7; color: #16a34a; }
    .badge-expense { background: #fee2e2; color: #dc2626; }
    .del-btn { background: none; border: none; color: #dc2626; cursor: pointer; font-size: 13px; }
    .month-input { padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; }
    .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
    .alltime-btn { padding: 8px 14px; background: white; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; font-size: 13px; }
    @media (max-width: 600px) { .summary { grid-template-columns: 1fr; } .charts { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="navbar">
    <h1>Expense Tracker</h1>
    <button onclick="logout()">Logout</button>
  </div>
  <div class="container">
    <div style="margin-bottom:1rem; display:flex; align-items:center; gap:10px;">
      <label style="font-size:14px;color:#555;">Month:</label>
      <input type="month" id="month-picker" class="month-input" onchange="loadAll()" />
      <button class="alltime-btn" onclick="clearMonth()">All time</button>
    </div>
    <div class="summary">
      <div class="stat"><p>Income</p><h2 class="income" id="total-income">0</h2></div>
      <div class="stat"><p>Expenses</p><h2 class="expense" id="total-expenses">0</h2></div>
      <div class="stat"><p>Balance</p><h2 class="balance" id="balance">0</h2></div>
    </div>
    <div class="charts">
      <div class="section"><h3>Spending by category</h3><canvas id="pie-chart"></canvas></div>
      <div class="section"><h3>Income vs expenses</h3><canvas id="bar-chart"></canvas></div>
    </div>
    <div class="section">
      <h3>Add transaction</h3>
      <div class="form-row">
        <input type="number" id="amount" placeholder="Amount" />
        <input type="text" id="description" placeholder="Description" />
        <input type="date" id="date" />
        <select id="type">
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
        <select id="category"></select>
        <button onclick="addTransaction()">Add</button>
      </div>
    </div>
    <div class="section">
      <h3>Transactions</h3>
      <table>
        <thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Type</th><th>Amount</th><th></th></tr></thead>
        <tbody id="transactions-body"></tbody>
      </table>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
