<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: white; padding: 2rem; border-radius: 12px; width: 360px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    h2 { margin-bottom: 1.5rem; font-size: 20px; }
    input { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    button { width: 100%; padding: 10px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; margin-bottom: 8px; }
    button:hover { background: #4338ca; }
    .secondary { background: white; color: #4f46e5; border: 1px solid #4f46e5; }
    .secondary:hover { background: #f5f3ff; }
    .error { color: red; font-size: 13px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <h2 id="form-title">Login</h2>
    <div class="error" id="error"></div>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button onclick="submit()">Login</button>
    <button class="secondary" onclick="toggleMode()">Switch to Register</button>
  </div>
  <script>
    let mode = "login";

    function toggleMode() {
      mode = mode === "login" ? "register" : "login";
      document.getElementById("form-title").textContent = mode === "login" ? "Login" : "Register";
      document.querySelector("button").textContent = mode === "login" ? "Login" : "Register";
      document.querySelector(".secondary").textContent = mode === "login" ? "Switch to Register" : "Switch to Login";
    }

    async function submit() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const errorEl = document.getElementById("error");
      errorEl.textContent = "";

      if (mode === "register") {
        const res = await fetch(`/users/register?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`, { method: "POST" });
        if (res.ok) {
          errorEl.style.color = "green";
          errorEl.textContent = "Registered! Please login.";
          toggleMode();
        } else {
          errorEl.style.color = "red";
          errorEl.textContent = "Registration failed.";
        }
        return;
      }

      const res = await fetch("/users/login", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: `username=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
      });
      if (res.ok) {
        const data = await res.json();
        localStorage.setItem("token", data.access_token);
        window.location.href = "/static/dashboard.html";
      } else {
        errorEl.textContent = "Invalid email or password.";
      }
    }
  </script>
</body>
</html>
